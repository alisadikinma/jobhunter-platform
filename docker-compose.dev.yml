services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobhunter
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: jobhunter
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunter -d jobhunter"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Firecrawl self-hosted — JD + company enrichment. Opt-in profile because
  # the upstream image requires building from https://github.com/mendableai/firecrawl;
  # without that build step the service won't start. Once built, run:
  #   docker compose -f docker-compose.dev.yml --profile firecrawl up -d
  firecrawl-api:
    image: mendableai/firecrawl-api:latest
    profiles: ["firecrawl"]
    environment:
      - REDIS_URL=redis://redis:6379/1
      - REDIS_RATE_LIMIT_URL=redis://redis:6379/1
      - PLAYWRIGHT_MICROSERVICE_URL=
      - PORT=3002
      - NUM_WORKERS_PER_QUEUE=8
      - HOST=0.0.0.0
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  firecrawl-worker:
    image: mendableai/firecrawl-worker:latest
    profiles: ["firecrawl"]
    environment:
      - REDIS_URL=redis://redis:6379/1
      - REDIS_RATE_LIMIT_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
