name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter
          POSTGRES_DB: jobhunter
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U jobhunter -d jobhunter"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://jobhunter:jobhunter@localhost:5433/jobhunter
      TEST_PG_HOST: localhost
      TEST_PG_PORT: "5433"
      TEST_PG_USER: jobhunter
      TEST_PG_PASSWORD: jobhunter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Mypy
        run: mypy app/

      - name: Pytest
        run: pytest -v
